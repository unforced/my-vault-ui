<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Vault</title>
    <!--
      GitHub Pages SPA fallback. Pages serves this for any unknown deep link
      (e.g. /entity/Projects%2FParachute). We stash the requested path and
      bounce to the app root, which restores it via the router.
      Served at a custom-domain root (my.unforced.org), so the app base is '/'.
    -->
    <script>
      sessionStorage.setItem('pv.redirect', location.pathname + location.search + location.hash)
      // App is served at root (vite base '/'). Bounce to root; the router restores the path.
      location.replace('/')
    </script>
  </head>
  <body></body>
</html>
